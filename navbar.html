<script type="text/javascript">
	(function() {
		var currentPage = window.location.href; 
		var htmlPage = currentPage.substr(currentPage.lastIndexOf('/') + 1);
		var pageName = htmlPage.split(".");
		pageName = pageName[0];
		var pageArray = ["index","demos","test"];
		var currentNav = "";
		var activeNav = "";
		
		for(var i=0; i < pageArray.length; i++) {
			currentNav = document.getElementById(pageArray[i]+"Nav");
			currentNav.className = "inactive";
			
			if (pageName === pageArray[i]) {
				activeNav = document.getElementById(pageName+"Nav");
				activeNav.className = "active";
			}
			
			if (pageArray[i] === "test") {
				switch(pageName) {
					case "logintest":
						activeNav = document.getElementById(pageArray[i]+"Nav");
						activeNav.className = "dropdown active";
						break;
					default:
						activeNav = document.getElementById(pageArray[i]+"Nav");
						activeNav.className = "dropdown";
				}
			}
		}
	})();
</script>
